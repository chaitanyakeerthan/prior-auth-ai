services:
  - type: web
    name: mediauth-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: mediauth-db
          property: connectionURI
      - key: DB_USERNAME
        fromDatabase:
          name: mediauth-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mediauth-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: mediauth-db
    plan: free
    databaseName: mediauth_db
