# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── H2 Database (development) ────────────────────────────────
spring.datasource.url=jdbc:h2:file:./xaip_dev_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── PostgreSQL (uncomment for production) ────────────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/xaip_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=xaip-super-secret-key-change-in-production-must-be-at-least-256-bits-long!!
jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://mediauth-gamma.vercel.app

# ── Google OAuth ─────────────────────────────────────────────
google.client.id=499168940155-vm2r19ru4lc9eini88f5g54i4e9vs8ef.apps.googleusercontent.com
