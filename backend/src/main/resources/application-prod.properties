# ── Production Profile ────────────────────────────────────────
# Activated via SPRING_PROFILES_ACTIVE=prod

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── PostgreSQL ────────────────────────────────────────────────
# We use the full JDBC URL here. 
# In Render, you will set SPRING_DATASOURCE_URL to: 
# jdbc:postgresql://HOSTNAME:PORT/DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable H2 in production
spring.h2.console.enabled=false

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Explicitly set dialect to help Hibernate start faster without metadata check
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Google OAuth ─────────────────────────────────────────────
google.client.id=${GOOGLE_CLIENT_ID}
