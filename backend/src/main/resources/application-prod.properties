# ── Production Profile ────────────────────────────────────────
# Activated via SPRING_PROFILES_ACTIVE=prod

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── PostgreSQL ────────────────────────────────────────────────
# Use individual connection params (easier with Render dashboard)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable H2 in production
spring.h2.console.enabled=false

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Dialect is auto-detected — no need to specify explicitly

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Google OAuth ─────────────────────────────────────────────
google.client.id=${GOOGLE_CLIENT_ID}
